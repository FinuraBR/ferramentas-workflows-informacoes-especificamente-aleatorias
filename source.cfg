//Sv_cheats are needed to change some important settings.
sv_cheats 1

//Versão directX
mat_dxlevel 112

//Compression of textures
mat_use_compressed_hdr_textures 0
mat_compressedtextures 0

//Main texture parametres
mat_antialias 16
mat_bumpmap 1
mat_parallaxmap 1
mat_hdr_level 2
mat_hdr_tonemapscale 16
//mat_hdr_uncapexposure 1
mat_specular 1
mat_diffuse 1

//Water
r_waterdrawreflection 1
r_waterdrawrefraction 1
r_waterforceexpensive 1
r_waterforcereflectentities 1
mat_wateroverlaysize 2048

//Shadows
mat_envmapsize 4096
mat_envmaptgasize 4096
r_shadowmaxrendered 2048
r_shadowrendertotexture 1
r_shadows 1
r_shadowcolor 75 75 75
r_shadowdist 500
r_shadowmaxrendered 1000

//AA settings
mat_aaquality 16
mat_software_aa_blur_one_pixel_lines 0.5
mat_software_aa_edge_threshold 0.8
mat_software_aa_quality 6
mat_software_aa_strength 6
mat_software_aa_strength_vgui 2

//Gamma
mat_monitorgamma 2.2
mat_monitorgamma_tv_enabled 0

//Motion blur
//mat_motion_blur_enabled 1
//mat_motion_blur_forward_enabled 0.2
//mat_motion_blur_strength 0.5

//Decals
r_queued_decals 1
mp_decals 4096
r_maxmodeldecal 4096
r_decals 99000

//Lights
r_maxdlights 300
r_worldlights 5000
r_dynamic 1
r_avglight 3
r_radiosity 3
mat_bloom_scalefactor_scalar 1.0

//Preloading of the levels while playing
cl_forcepreload 1
sv_forcepreload 1

//Draw distance
cl_detaildist 10000
cl_detailfade 9999999
mat_picmip -10
r_lod -10
c_maxdistance 800
cl_maxrenderable_dist 8096
r_rootlod -10
r_rainradius 5000
lod_transitiondist 6400

//Optimization for multi-core CPUS
r_threaded_particles 1
r_threaded_renderables 1

//Screenshot quality
jpeg_quality 100

//Hud
//cl_software_cursor 1
//cl_drawhud 1

//Autosave while playing
sv_autosave 1

// Mouse
//sensitivity "2.80"
//zoom_sensitivity_ratio "1.6"
//m_rawinput "1"
//m_pitch "0.022"
//m_filter "1"
//m_customaccel "0"
//m_mouseaccel1 "0"
//m_mouseaccel2 "0"

// FOV
//r_JeepFOV 85
//fov_desired 90
//fov 100
//viewmodel_fov 63

//Other
mat_levelflush 1
mat_forcedynamic 1
r_drawflecks 1
cl_ragdoll_collide 1