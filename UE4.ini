[SystemSettings]
; --- Qualidade Base Máxima ---
r.DetailMode=2
r.MaterialQualityLevel=3
r.GBufferFormat=5
r.MaxAnisotropy=16
r.ForceHighestMipOnUITextures=1

; --- Iluminação e Pós-Processamento ---
r.DefaultFeature.LightUnits=2
r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=1
r.DefaultFeature.MotionBlur=0
r.BloomQuality=5
r.LensFlareQuality=3
r.Atmosphere=1
r.ContactShadows=1
r.SceneColorFringeQuality=0
r.PostProcessAAQuality=6
r.Tonemapper.Sharpen=1

; --- Ambient Occlusion (GTAO) ---
r.AmbientOcclusion.Method=1
r.AOQuality=2
r.AOSpecularOcclusionMode=1
r.GTAO.NumAngles=16

; --- Sombras ---
r.Shadow.DistanceScale=4
r.Shadow.MaxResolution=4096
r.Shadow.RadiusThreshold=0.01
r.DFShadowQuality=3
r.DFFullResolution=1
r.CapsuleShadows=1

; --- Reflexos (SSR) ---
r.SSR.Quality=4
r.SSR.MaxRoughness=1.0
r.ReflectionCaptureResolution=1024

; --- Volumetria ---
r.VolumetricFog=1
r.VolumetricFog.GridPixelSize=4

; --- Distância e LOD ---
r.ViewDistanceScale=5
r.StaticMeshLODDistanceScale=0.1
foliage.LODDistanceScale=5
grass.DensityScale=1

; --- Streaming de Texturas ---
r.Streaming.LimitPoolSizeToVRAM=0
r.Streaming.MaxEffectiveScreenSize=0

; --- Subsurface Scattering e Partículas ---
r.SSS.Quality=1
r.ParticleLightQuality=2
